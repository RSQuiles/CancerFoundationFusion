# Configuration for the SurvBoard Survival Prediction Task
#
# Task: Train a Cox PH head on CFF embeddings from bulk RNA-seq; generate
# per-patient survival functions; save them in SurvBoard's consolidated CSV
# format for external evaluation with SurvBoard's evaluate_metrics.py.
#
# Survival functions are written to:
#   {survboard_results_dir}/{COHORT}/{CANCER}/cff/split_{fold_index}.csv
# (or {save_dir}/survival_functions_cff/... if survboard_results_dir is unset)
#
# Run:
#   cd evaluate/finetune/scripts && bash survival.sh
#   python run_downstream_task.py --config configs/survival_pred_config.yaml

finetune:
  survival:

    # ===== REQUIRED =====

    pretrained_model_path: /cluster/work/boeva/rquiles/outputs/save_CFF/ablation_base_comparison/aggregation/epoch_epoch=00.ckpt

    # Root directory containing {COHORT}_{CANCER}.parquet files.
    survboard_data_dir: /cluster/work/boeva/bulkFM/data/processed/survboard

    # Cohorts and cancer types to include.  Every combination that has a
    # matching parquet file is loaded and concatenated before training.
    cohorts: [TCGA]
    cancer_types:
      # TCGA (22 cancer types)
      - BRCA
      - BLCA
      - COAD
      - GBM
      - KIRC
      - LAML
      - LGG
      - LIHC
      - LUAD
      - LUSC
      - OV
      - PAAD
      - SARC
      - SKCM
      - STAD
      - UCEC
      # Uncomment to add ICGC cohort (set cohorts: [TCGA, ICGC])
      # - CLLE-ES
      # - LIRI-JP
      # - PACA-AU
      # - PACA-CA
      # Uncomment to add METABRIC cohort (set cohorts: [TCGA, METABRIC])
      # - BRCA   # METABRIC BRCA

    head_learning_rate: 0.001

    # ===== PRE-MADE SPLITS =====
    # Directory containing SurvBoard's official split index CSVs:
    #   {splits_dir}/{COHORT}/{CANCER}_train_splits.csv
    #   {splits_dir}/{COHORT}/{CANCER}_test_splits.csv
    # Each CSV: rows = folds, columns = NaN-padded integer sample indices.
    splits_dir: /cluster/work/boeva/bulkFM/data/processed/survboard/data_reproduced/splits
    # fold_index: integer (0–24)  → train a single fold; save split_{fold}.csv
    # fold_index: "all"           → train one Cox head per fold internally;
    #                               report mean C-index; save all split_*.csv files
    fold_index: 0

    # ===== OUTPUT =====

    # Where the runner saves model checkpoints.
    save_dir: /cluster/work/boeva/rquiles/outputs/save_CFF/survival/checkpoints

    # Where survival-function CSVs are written for SurvBoard evaluation.
    # Defaults to {save_dir}/survival_functions_cff/ when unset.
    survboard_results_dir: /cluster/work/boeva/rquiles/outputs/save_CFF/survival/results

    # ===== DATA =====
    test_size: 0.2                 # only used when splits_dir is unset
    train_test_split_version: 1

    # ===== MODEL ARCHITECTURE =====
    # EmbeddingPredHead: embedding_dim → hidden_dim → 1 (scalar risk score)
    hidden_dim: 128
    dropout: 0.1

    # ===== TRAINING HYPERPARAMETERS =====
    epochs: 30
    batch_size: 64
    # Cox batches should be large enough to contain multiple observed events.

    min_lr: 0.000001
    first_cycle_steps: 20
    cycle_mult: 2.0
    warmup_steps: 5
    gamma: 0.9
    grad_accumulation_steps: 1
    max_grad_norm: 10.0
